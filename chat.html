<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — TestNow</title>
<meta name="theme-color" content="#0A6B36">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0A6B36; --ink-soft: #0E8C45; --paper: #F5F0E6; --paper-warm: #EBE3D2;
    --accent: #D6206E; --muted: #5b6b62;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter Tight', sans-serif;
    background: var(--paper); color: var(--ink);
    display: flex; flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  header.bar {
    background: var(--ink); color: var(--paper);
    padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
  }
  header.bar .title {
    font-family: 'Fraunces', serif; font-size: 18px; letter-spacing: -0.01em;
  }
  header.bar .meta { font-size: 12px; color: rgba(245,240,230,.7); }
  header.bar .pill {
    font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 999px; background: rgba(245,240,230,.15);
  }
  .complete-btn {
    background: var(--accent); color: var(--paper); border: none;
    padding: 10px 18px; border-radius: 999px; font-family: inherit;
    font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: .02em;
  }
  .complete-btn:hover { opacity: .9; }
  .complete-btn:disabled { opacity: .4; cursor: not-allowed; }

  .stream {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 10px;
    max-width: 760px; width: 100%; margin: 0 auto;
  }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; font-size: 15px; line-height: 1.4; }
  .msg .who { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; opacity: .65; margin-bottom: 3px; }
  .msg .when { font-size: 10px; opacity: .55; margin-top: 4px; }
  .me   { align-self: flex-end; background: var(--ink); color: var(--paper); border-bottom-right-radius: 4px; }
  .them { align-self: flex-start; background: var(--paper-warm); color: var(--ink); border-bottom-left-radius: 4px; }
  .mod  { align-self: center; background: var(--accent); color: var(--paper); font-size: 13px; max-width: 90%; text-align: center; }
  .sys  { align-self: center; color: var(--muted); font-size: 12px; padding: 6px 12px; font-style: italic; }
  .info {
    align-self: center; color: var(--muted); font-size: 13px; padding: 12px 16px;
    background: var(--paper-warm); border-radius: 12px; max-width: 90%; text-align: center;
  }

  .composer {
    border-top: 1.5px solid rgba(10,107,54,.15); padding: 14px 20px; background: var(--paper);
    display: flex; gap: 10px; max-width: 760px; margin: 0 auto; width: 100%;
  }
  .composer textarea {
    flex: 1; resize: none; border: 1.5px solid rgba(10,107,54,.25); border-radius: 14px;
    padding: 12px 14px; font-family: inherit; font-size: 15px; line-height: 1.4;
    background: var(--paper); color: var(--ink); min-height: 46px; max-height: 120px;
  }
  .composer textarea:focus { outline: none; border-color: var(--ink); }
  .composer button {
    background: var(--ink); color: var(--paper); border: none; padding: 0 22px;
    border-radius: 14px; font-family: inherit; font-weight: 600; cursor: pointer;
  }
  .composer button:disabled { opacity: .4; cursor: not-allowed; }

  .closed-banner {
    padding: 14px; background: var(--paper-warm); color: var(--ink-soft);
    text-align: center; font-size: 14px; border-top: 1.5px solid rgba(10,107,54,.15);
  }
</style>
</head>
<body>

<header class="bar">
  <div>
    <div class="title">TestNow private chat</div>
    <div class="meta" id="meta">Connecting…</div>
  </div>
  <div style="display:flex; align-items:center; gap:12px;">
    <span class="pill" id="status-pill">Open</span>
    <button class="complete-btn" id="complete-btn">Mark swap complete</button>
  </div>
</header>

<div class="stream" id="stream">
  <div class="info">
    You're in an anonymous chat with another learner. You can only see them as a label — never their name or number. Coordinate your swap together and tap "Mark swap complete" when it's done.
  </div>
</div>

<div class="composer" id="composer">
  <textarea id="input" placeholder="Type a message…" rows="1"></textarea>
  <button id="send">Send</button>
</div>

<script>
  const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbxpAa2f8VaJvKwQspRz0QEsp9KZIB_7ZIkMwskYPl2zjLgtsqoi8l_PqpvrtpQ7c2JO/exec";

  const qs = new URLSearchParams(location.search);
  const SID = qs.get('cs') || qs.get('sid') || '';
  const TK = qs.get('tk') || '';

  const stream = document.getElementById('stream');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const completeBtn = document.getElementById('complete-btn');
  const meta = document.getElementById('meta');
  const statusPill = document.getElementById('status-pill');
  const composer = document.getElementById('composer');

  let YOU_ARE = '';
  let OTHER_HANDLE = '';
  let LAST_INDEX = 0;
  let SESSION_STATUS = 'open';
  let POLLING = true;

  if (!SID || !TK) {
    meta.textContent = 'Invalid chat link.';
    composer.style.display = 'none';
    completeBtn.style.display = 'none';
  } else {
    initSession();
  }

  function initSession() {
    fetch(SHEET_ENDPOINT + '?action=chatSession&cs=' + encodeURIComponent(SID) + '&tk=' + encodeURIComponent(TK))
      .then(r => r.json())
      .then(d => {
        if (d.result !== 'success') throw new Error(d.message || 'failed');
        YOU_ARE = d.youAre;
        OTHER_HANDLE = d.otherHandle;
        SESSION_STATUS = d.status;
        meta.textContent = 'You are ' + (YOU_ARE === 'A' ? 'Learner A' : 'Learner B') + ' · chatting with ' + OTHER_HANDLE;
        if (d.context) meta.textContent += ' · ' + d.context;
        if (SESSION_STATUS !== 'open') setClosedUI();
        pollMessages();
      })
      .catch(err => {
        meta.textContent = 'Could not open chat.';
        composer.style.display = 'none';
        completeBtn.style.display = 'none';
      });
  }

  function pollMessages() {
    if (!POLLING) return;
    fetch(SHEET_ENDPOINT + '?action=chatMessages&cs=' + encodeURIComponent(SID) + '&tk=' + encodeURIComponent(TK) + '&since=' + LAST_INDEX)
      .then(r => r.json())
      .then(d => {
        if (d.result === 'success' && Array.isArray(d.messages)) {
          d.messages.forEach(m => {
            renderMessage(m);
            LAST_INDEX = Math.max(LAST_INDEX, m.idx + 1);
          });
          if (d.status && d.status !== 'open' && SESSION_STATUS === 'open') {
            SESSION_STATUS = d.status;
            setClosedUI();
          }
        }
      })
      .catch(() => {})
      .finally(() => {
        if (POLLING) setTimeout(pollMessages, 2000);
      });
  }

  function renderMessage(m) {
    const div = document.createElement('div');
    if (m.sender === 'MOD') {
      div.className = 'msg mod';
      div.innerHTML = '<div class="who">TestNow Moderator</div>' + escapeHtml(m.text) + '<div class="when">' + m.ts + '</div>';
    } else if (m.sender === 'SYSTEM') {
      div.className = 'sys';
      div.textContent = m.text;
    } else if (m.sender === YOU_ARE) {
      div.className = 'msg me';
      div.innerHTML = escapeHtml(m.text) + '<div class="when">' + m.ts + '</div>';
    } else {
      div.className = 'msg them';
      div.innerHTML = '<div class="who">' + escapeHtml(OTHER_HANDLE) + '</div>' + escapeHtml(m.text) + '<div class="when">' + m.ts + '</div>';
    }
    stream.appendChild(div);
    stream.scrollTop = stream.scrollHeight;
  }

  function sendMessage() {
    const text = input.value.trim();
    if (!text || SESSION_STATUS !== 'open') return;
    input.value = '';
    sendBtn.disabled = true;
    fetch(SHEET_ENDPOINT, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'chatSend', sid: SID, tk: TK, text: text })
    })
    .finally(() => { sendBtn.disabled = false; input.focus(); });
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  completeBtn.addEventListener('click', () => {
    if (SESSION_STATUS !== 'open') return;
    if (!confirm('Mark this swap as complete? The chat will close for both of you.')) return;
    fetch(SHEET_ENDPOINT, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'chatClose', sid: SID, tk: TK })
    });
  });

  function setClosedUI() {
    statusPill.textContent = 'Closed';
    statusPill.style.background = 'rgba(245,240,230,.08)';
    completeBtn.disabled = true;
    sendBtn.disabled = true;
    input.disabled = true;
    input.placeholder = 'Chat closed';
    const banner = document.createElement('div');
    banner.className = 'closed-banner';
    banner.textContent = 'This chat has been closed.';
    composer.parentNode.replaceChild(banner, composer);
    POLLING = false;
  }

  function escapeHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
</script>
</body>
</html>
